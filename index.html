<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>颈部训练计时器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f2ea;
      --panel: #fffdf8;
      --ink: #1f2933;
      --muted: #64748b;
      --line: #d8dce2;
      --accent: #0f8b8d;
      --accent-2: #e85d75;
      --rest: #64748b;
      --ring-color: var(--accent);
      --shadow: 0 18px 48px rgba(31, 41, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 139, 141, 0.12), transparent 28rem),
        linear-gradient(145deg, #f7efe1 0%, #edf5f2 52%, #f9f6ef 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 24px;
      align-items: stretch;
    }

    .timer {
      min-height: 620px;
      padding: clamp(22px, 4vw, 44px);
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(216, 220, 226, 0.86);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 28px;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 650;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(15, 139, 141, 0.12);
      flex: 0 0 auto;
    }

    .phase-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1.08;
      letter-spacing: 0;
      max-width: 9em;
    }

    .ring-wrap {
      display: grid;
      place-items: center;
      padding: 8px 0;
    }

    .ring {
      --progress: 0deg;
      width: min(66vw, 330px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--ring-color) var(--progress), #e3e8ec 0deg);
      display: grid;
      place-items: center;
      transition: background 160ms linear;
      box-shadow: inset 0 0 0 1px rgba(31, 41, 51, 0.05);
    }

    .ring::before {
      content: "";
      width: calc(100% - 34px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--panel);
      box-shadow: inset 0 0 0 1px rgba(216, 220, 226, 0.85);
    }

    .time {
      position: absolute;
      display: grid;
      place-items: center;
      gap: 6px;
      text-align: center;
    }

    .seconds {
      font-variant-numeric: tabular-nums;
      font-size: clamp(72px, 14vw, 118px);
      font-weight: 800;
      line-height: 0.9;
    }

    .unit {
      color: var(--muted);
      font-size: 17px;
      font-weight: 700;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 0 20px;
      font: inherit;
      font-weight: 760;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      box-shadow: 0 10px 24px rgba(15, 139, 141, 0.2);
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(15, 139, 141, 0.24);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      color: var(--ink);
      background: #e9edf1;
      box-shadow: none;
    }

    .list {
      background: rgba(255, 253, 248, 0.8);
      border: 1px solid rgba(216, 220, 226, 0.86);
      border-radius: 8px;
      overflow: hidden;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .list-title {
      padding: 18px 18px 14px;
      font-size: 16px;
      font-weight: 800;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.92);
    }

    ol {
      margin: 0;
      padding: 8px;
      list-style: none;
      overflow: auto;
    }

    li {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 44px;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    li.current {
      color: var(--ink);
      background: rgba(15, 139, 141, 0.12);
    }

    li.done {
      color: #8a94a3;
    }

    .idx {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #eef2f4;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    li.current .idx {
      color: #fff;
      background: var(--accent);
    }

    .duration {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .finished .status-dot {
      background: var(--accent-2);
      box-shadow: 0 0 0 6px rgba(232, 93, 117, 0.12);
    }

    .finished .ring {
      background: conic-gradient(var(--accent-2) 360deg, #e3e8ec 0deg);
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
        align-items: start;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .timer {
        min-height: calc(100vh - 28px);
      }

      .list {
        max-height: 360px;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="颈部训练计时器">
    <section class="timer" id="timerPanel">
      <div class="topline">
        <div class="phase-meta">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="phaseCount">准备开始</span>
        </div>
        <span id="totalTime">总计 4:15</span>
      </div>

      <h1 id="phaseTitle">颈部训练</h1>

      <div class="ring-wrap">
        <div class="ring" id="ring" role="timer" aria-live="polite" aria-label="倒计时">
          <div class="time">
            <div class="seconds" id="seconds">15</div>
            <div class="unit" id="unit">秒</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="startPause">开始</button>
        <button class="secondary" id="restart">重开</button>
      </div>
    </section>

    <aside class="list" aria-label="训练阶段">
      <div class="list-title">阶段</div>
      <ol id="phaseList"></ol>
    </aside>
  </main>

  <script>
    const phases = [
      { title: "左手扶额头", seconds: 15 },
      { title: "休息", seconds: 15, rest: true },
      { title: "右手扶额头", seconds: 15 },
      { title: "休息", seconds: 15, rest: true },
      { title: "左手扶额头", seconds: 15 },
      { title: "休息", seconds: 15, rest: true },
      { title: "右手扶额头", seconds: 15 },
      { title: "休息", seconds: 15, rest: true },
      { title: "左侧对抗太阳穴", seconds: 15 },
      { title: "右侧对抗太阳穴", seconds: 15 },
      { title: "左侧对抗太阳穴", seconds: 15 },
      { title: "右侧对抗太阳穴", seconds: 15 },
      { title: "休息", seconds: 15, rest: true },
      { title: "弹力带对抗", seconds: 15 },
      { title: "休息", seconds: 30, rest: true },
      { title: "弹力带对抗", seconds: 15 }
    ];

    const panel = document.getElementById("timerPanel");
    const phaseTitle = document.getElementById("phaseTitle");
    const phaseCount = document.getElementById("phaseCount");
    const secondsEl = document.getElementById("seconds");
    const unitEl = document.getElementById("unit");
    const ring = document.getElementById("ring");
    const startPause = document.getElementById("startPause");
    const restart = document.getElementById("restart");
    const phaseList = document.getElementById("phaseList");
    const totalTime = document.getElementById("totalTime");

    let current = 0;
    let remaining = phases[0].seconds;
    let running = false;
    let finished = false;
    let deadline = 0;
    let pausedAt = 0;
    let frame = null;

    const totalSeconds = phases.reduce((sum, phase) => sum + phase.seconds, 0);
    totalTime.textContent = `总计 ${formatTime(totalSeconds)}`;

    phaseList.innerHTML = phases.map((phase, index) => `
      <li>
        <span class="idx">${index + 1}</span>
        <span>${phase.title}</span>
        <span class="duration">${phase.seconds}s</span>
      </li>
    `).join("");

    function formatTime(value) {
      const minutes = Math.floor(value / 60);
      const seconds = value % 60;
      return `${minutes}:${String(seconds).padStart(2, "0")}`;
    }

    function setAccent(phase) {
      const accent = phase.rest ? "var(--rest)" : "var(--accent)";
      ring.style.setProperty("--ring-color", accent);
    }

    function render() {
      const phase = phases[current];
      const progress = finished ? 360 : ((phase.seconds - remaining) / phase.seconds) * 360;

      panel.classList.toggle("finished", finished);
      phaseTitle.textContent = finished ? "训练完成" : phase.title;
      phaseCount.textContent = finished ? "全部完成" : `${current + 1} / ${phases.length}`;
      secondsEl.textContent = finished ? "0" : remaining;
      unitEl.textContent = finished ? "完成" : "秒";
      ring.style.setProperty("--progress", `${progress}deg`);
      setAccent(phase);

      [...phaseList.children].forEach((item, index) => {
        item.classList.toggle("current", !finished && index === current);
        item.classList.toggle("done", finished || index < current);
      });
    }

    function tick() {
      if (!running) return;

      const left = Math.max(0, Math.ceil((deadline - performance.now()) / 1000));
      if (left !== remaining) {
        remaining = left;
        render();
      }

      if (performance.now() >= deadline) {
        nextPhase();
        return;
      }

      frame = requestAnimationFrame(tick);
    }

    function nextPhase() {
      if (current >= phases.length - 1) {
        running = false;
        finished = true;
        startPause.textContent = "再来一次";
        cancelAnimationFrame(frame);
        render();
        return;
      }

      current += 1;
      remaining = phases[current].seconds;
      deadline = performance.now() + remaining * 1000;
      render();
      frame = requestAnimationFrame(tick);
    }

    function startTimer() {
      if (finished) {
        resetTimer();
      }

      running = true;
      deadline = performance.now() + remaining * 1000;
      startPause.textContent = "暂停";
      render();
      frame = requestAnimationFrame(tick);
    }

    function pauseTimer() {
      running = false;
      pausedAt = performance.now();
      startPause.textContent = "继续";
      cancelAnimationFrame(frame);
    }

    function resetTimer() {
      running = false;
      finished = false;
      current = 0;
      remaining = phases[0].seconds;
      deadline = 0;
      pausedAt = 0;
      startPause.textContent = "开始";
      cancelAnimationFrame(frame);
      render();
    }

    startPause.addEventListener("click", () => {
      if (running) {
        pauseTimer();
      } else {
        startTimer();
      }
    });

    restart.addEventListener("click", resetTimer);

    document.addEventListener("visibilitychange", () => {
      if (document.hidden || !running) return;
      deadline = performance.now() + remaining * 1000;
    });

    render();
  </script>
</body>
</html>
